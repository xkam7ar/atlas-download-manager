name: Bug report
description: Report reproducible behavior that appears to be incorrect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Atlas. Do not report security vulnerabilities here; follow `SECURITY.md` instead.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: This report does not contain passwords, cookies, tokens, private URLs, or other sensitive data.
          required: true
  - type: input
    id: version
    attributes:
      label: Atlas version
      description: Run `atlas --version` or provide the commit SHA.
      placeholder: atlas 0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reliably reproduces the problem.
      placeholder: |
        1. Run ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove usernames, paths, URLs, cookies, tokens, and other private data before pasting logs.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include relevant downloader versions, configuration, or screenshots after removing private information.
