name: Quality

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: uv run ruff check .
      - run: uv run mypy src/atlas
      - run: uv run pytest -m "not integration"

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: uv build --out-dir dist
      - name: Verify source package contents
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          archive = next(Path("dist").glob("*.tar.gz"))
          with tarfile.open(archive) as package:
              forbidden = (
                  ".codebase-memory",
                  ".git",
                  ".mypy_cache",
                  ".pytest_cache",
                  ".ruff_cache",
                  ".venv",
                  "__pycache__",
              )
              leaked = [
                  item.name
                  for item in package.getmembers()
                  if any(part in item.name.split("/") for part in forbidden)
              ]
          if leaked:
              raise SystemExit(f"source package contains generated data: {leaked}")
          PY
      - name: Smoke-test built wheel
        run: |
          uv venv --python 3.12 .package-venv
          uv pip install --python .package-venv/bin/python dist/*.whl
          .package-venv/bin/atlas --help
          .package-venv/bin/atlas --version
          .package-venv/bin/python -m atlas --help

  macos-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: uv run pytest -m "not integration"
      - run: uv run atlas --plain --help
      - run: uv run atlas --version
      - run: zsh -n install.sh
      - run: ruby -c packaging/homebrew/atlas.rb
